# This workflow is intentionally minimal.
# All release logic (push, tag, release creation, callback) is handled by
# onboardid-flutter source repo, similar to how onboardid-ios handles onboardid-pod.
#
# This workflow only validates the package on tag push.

name: Validate Release

on:
  push:
    tags:
      - 'v*'
      - '*-beta.*'

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify package
        run: flutter pub publish --dry-run

      - name: Summary
        run: |
          echo "## Package Validated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is a distribution repo. Release was created by onboardid-flutter." >> $GITHUB_STEP_SUMMARY

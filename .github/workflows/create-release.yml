name: Create Release

on:
  push:
    tags:
      - 'v*'
      - '*-beta.*'

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Extract version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Check if beta
          if [[ "$TAG" == *"-beta."* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Verify package
        run: flutter pub publish --dry-run

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          if [ "$PRERELEASE" == "true" ]; then
            gh release create "$TAG" \
              --title "Beta $TAG" \
              --notes "Beta release $TAG for testing." \
              --prerelease
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes "Production release $TAG.

See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

      - name: Send message to Slack
        if: steps.version.outputs.is_beta == 'false'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \":rocket: *Flutter SDK Release!* \n*Version:* ${{ steps.version.outputs.tag }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      # Report as "onboardid-flutter" (not onboardid-flutter-pub) for hub tracking consistency
      # This matches how onboardid-ios/onboardid-pod works - hub tracks the source repo name
      - name: Report release to mobile-platform-hub
        if: steps.version.outputs.is_beta == 'false'
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 5
          command: |
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.CROSS_REPO_TOKEN }}" \
              https://api.github.com/repos/netkicorp/mobile-platform-hub/dispatches \
              -d '{"event_type":"repo-released","client_payload":{"repo":"onboardid-flutter","version":"${{ steps.version.outputs.tag }}","release_url":"https://github.com/netkicorp/onboardid-flutter-pub/releases/tag/${{ steps.version.outputs.tag }}"}}'
